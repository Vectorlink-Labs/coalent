<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="96" height="96" role="img" aria-label="Coalent">
  <defs>
    <linearGradient id="cog" x1="8" y1="8" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>
  <!-- open ring forming a "C": context gathering toward focus -->
  <path d="M35 13.5 A15 15 0 1 0 35 34.5" fill="none" stroke="url(#cog)"
        stroke-width="5.5" stroke-linecap="round"/>
  <!-- provenance nodes riding the arc -->
  <circle cx="13.6" cy="14.2" r="2" fill="#22D3EE"/>
  <circle cx="9" cy="24" r="2" fill="#22D3EE"/>
  <circle cx="13.6" cy="33.8" r="2" fill="#22D3EE"/>
  <!-- focal core: the materialized, fresh understanding -->
  <circle cx="24" cy="24" r="5.6" fill="url(#cog)"/>
  <circle cx="24" cy="24" r="2.2" fill="#ECFEFF"/>
</svg>
