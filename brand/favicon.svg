<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="Coalent">
  <defs>
    <linearGradient id="fav" x1="8" y1="8" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#818CF8"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>
  <!-- dark rounded tile so the mark pops in any browser tab -->
  <rect width="48" height="48" rx="11" fill="#0B1020"/>
